services:
  - type: web
    name: antimule-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DB_BACKEND
        value: mongodb
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: antimule
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
